<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 - Studio Not Found | PluggedIn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/pluggedin.bundle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (theme === 'dark' || (!theme && prefersDark)) document.documentElement.classList.add('dark');
        })();
    </script>
</head>
<body class="bg-gray-50 dark:bg-black min-h-screen text-gray-900 dark:text-gray-100 transition-colors duration-300 flex flex-col">
    <nav class="bg-white/80 dark:bg-black/80 backdrop-blur-md border-b dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center">
                    <img src="PluggedIn_Studio_Light.png" alt="PluggedIn Studio" class="h-10 w-auto">
                </a>
                <a href="explore.html" class="text-sm font-medium hover:text-blue-600 transition-colors">Find Studios</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 py-20 relative overflow-hidden">
        <!-- Abstract background glow -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-blue-500/20 blur-[120px] rounded-full"></div>
        
        <div class="max-w-xl w-full text-center relative z-10">
            <h1 class="text-9xl font-black text-transparent bg-clip-text bg-gradient-to-br from-blue-600 to-purple-600 mb-4 animate-pulse">404</h1>
            <h2 class="text-4xl font-extrabold mb-6">Lost in the Mix?</h2>
            <p class="text-gray-600 dark:text-gray-400 text-lg mb-10 leading-relaxed">
                We couldn't find the page you're looking for. It might have been moved, deleted, or never existed in this session.
            </p>

            <div class="bg-white dark:bg-slate-900 p-2 rounded-2xl shadow-2xl flex items-center mb-10 border dark:border-slate-800">
                <input type="text" placeholder="Search for studios, cities, or gear..." 
                       class="flex-grow bg-transparent px-4 py-3 outline-none" id="errorSearch">
                <button onclick="window.location.href='explore.html?q=' + document.getElementById('errorSearch').value" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition-all transform active:scale-95">
                    Search
                </button>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="index.html" class="w-full sm:w-auto px-8 py-4 bg-gray-200 dark:bg-slate-800 hover:bg-gray-300 dark:hover:bg-slate-700 rounded-2xl font-bold transition-colors">
                    Back to Home
                </a>
                <a href="explore.html" class="w-full sm:w-auto px-8 py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 hover:bg-slate-800 dark:hover:bg-gray-100 rounded-2xl font-bold transition-colors">
                    Explore Studios
                </a>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center text-sm text-gray-500">
        <p>&copy; 2026 PluggedIn Studio. All rights reserved.</p>
    </footer>
</body>
</html>
