<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Server Error - PluggedIn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/pluggedin.bundle.css">
</head>
<body class="bg-gray-50 dark:bg-black min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full text-center space-y-8 bg-white dark:bg-slate-900 p-12 rounded-3xl shadow-2xl border dark:border-slate-800">
        <div class="flex justify-center">
            <div class="w-24 h-24 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center">
                <svg class="w-12 h-12 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
        </div>
        <h1 class="text-4xl font-black text-gray-900 dark:text-white">500</h1>
        <div class="space-y-4">
            <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-200">Something went wrong</h2>
            <p class="text-gray-600 dark:text-gray-400">Our engineers are already on the case. Please try again in a few minutes.</p>
        </div>
        <div class="flex flex-col space-y-3">
            <a href="/" class="bg-black dark:bg-white text-white dark:text-black px-8 py-4 rounded-xl font-bold hover:scale-105 active:scale-95 transition-all shadow-lg">
                Back to Homepage
            </a>
            <button onclick="window.location.reload()" class="text-gray-500 dark:text-gray-400 font-medium hover:text-gray-700 dark:hover:text-white transition-colors">
                Reload Page
            </button>
        </div>
    </div>
</body>
</html>
