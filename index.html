<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PluggedIn.studio - Coming Soon</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="PluggedIn_Studio_Light.png" alt="PluggedIn.studio Logo" class="logo light-logo">
            <img src="PluggedIn_Studio_Dark.png" alt="PluggedIn.studio Logo" class="logo dark-logo">
        </div>
        
        <h1>Coming Soon</h1>
        <p class="tagline">The next generation platform for music creators is almost here.</p>
        
        <div class="countdown" id="countdown">
            <div class="time-block">
                <span id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-block">
                <span id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-block">
                <span id="minutes">00</span>
                <span class="time-label">Minutes</span>
            </div>
            <div class="time-block">
                <span id="seconds">00</span>
                <span class="time-label">Seconds</span>
            </div>
        </div>
        
        <div class="video-container">
            <video controls autoplay muted loop>
                <source src="Simulator Screen Recording - iPhone 16 Pro - 2025-06-02 at 08.14.16.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="subscribe">
            <h2>Be the first to know when we launch</h2>
            <form id="subscribe-form">
                <input type="email" placeholder="Your email address" required>
                <button type="submit">Notify Me</button>
            </form>
        </div>
        
        <div class="social-links">
            <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-facebook"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
